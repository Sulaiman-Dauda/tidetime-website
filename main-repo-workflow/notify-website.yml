# Copy this file to the MAIN Tidetime repository at:
#   .github/workflows/notify-website.yml
#
# It tells the website repo to rebuild whenever the documentation changes, so the
# published docs stay in sync. Requires a repository secret WEBSITE_DISPATCH_TOKEN
# (a fine-grained personal access token with permission to dispatch workflows /
# write Actions on the tidetime-website repo).
#
# Update OWNER/REPO below to match your website repository.
name: Notify website of docs changes

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Sulaiman-Dauda/tidetime-website/dispatches \
            -d '{"event_type":"docs-updated"}'
