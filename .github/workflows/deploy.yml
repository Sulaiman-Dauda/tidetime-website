name: Deploy site to GitHub Pages

on:
  # Rebuild when the website itself changes.
  push:
    branches: [main]
  # Manual rebuild from the Actions tab.
  workflow_dispatch:
  # Rebuild when the main repo signals that /docs changed (see the main repo's
  # .github/workflows/notify-website.yml). Keeps published docs in sync.
  repository_dispatch:
    types: [docs-updated]

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (syncs /docs from the main repo, then builds)
        run: npm run build
        env:
          # configure-pages provides the correct origin + base for the repo,
          # whether it's a custom domain or a project page.
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
